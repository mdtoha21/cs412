{% extends 'project/base.html' %}

{% block content %}
<h2>{{ menu_item.name }}</h2>
<p><strong>Restaurant:</strong> <a href="{% url 'project:restaurant_detail' menu_item.restaurant.pk %}">{{ menu_item.restaurant.name }}</a></p>
<p><strong>Price:</strong> ${{ menu_item.price }}</p>
<p><strong>Description:</strong> {{ menu_item.description }}</p>

{% if menu_item.image %}
    <p><img src="{{ menu_item.image.url }}" alt="{{ menu_item.name }}" style="max-width: 360px;"></p>
{% endif %}
{% endblock %}
