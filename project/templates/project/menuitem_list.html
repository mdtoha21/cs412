{% extends 'project/base.html' %}

{% block content %}
<h2>Menu Items</h2>
<table>
    <thead>
        <tr>
            <th>Name</th>
            <th>Restaurant</th>
            <th>Price</th>
            <th>Details</th>
        </tr>
    </thead>
    <tbody>
        {% for item in menu_items %}
            <tr>
                <td>{{ item.name }}</td>
                <td>{{ item.restaurant.name }}</td>
                <td>${{ item.price }}</td>
                <td><a href="{% url 'project:menuitem_detail' item.pk %}">View</a></td>
            </tr>
        {% empty %}
            <tr><td colspan="4">No menu items yet.</td></tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
