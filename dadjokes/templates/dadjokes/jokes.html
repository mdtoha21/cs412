<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dad Jokes - All Jokes</title>
  <style>
    body { font-family: sans-serif; max-width: 760px; margin: 2rem auto; line-height: 1.5; }
    nav a { margin-right: 12px; }
    li { margin-bottom: 0.8rem; }
  </style>
</head>
<body>
  <h1>All Jokes</h1>
  <nav>
    <a href="{% url 'dadjokes_index' %}">Home</a>
    <a href="{% url 'dadjokes_random' %}">Random</a>
    <a href="{% url 'dadjokes_pictures' %}">All Pictures</a>
  </nav>

  <ul>
    {% for joke in jokes %}
      <li>
        {{ joke.text }}<br />
        <small>by {{ joke.contributor }} | <a href="{% url 'dadjokes_joke_detail' joke.pk %}">detail</a></small>
      </li>
    {% empty %}
      <li>No jokes found.</li>
    {% endfor %}
  </ul>
</body>
</html>
