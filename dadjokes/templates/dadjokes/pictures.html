{% extends "dadjokes/base.html" %}
{% block content %}
  <h1>Pictures</h1>
  <ul>
    {% for p in pictures %}
      <li>
        <a href="{% url 'dadjokes:picture_detail' p.id %}">View the picture</a>
        — {{ p.contributor }}
      </li>
    {% empty %}
      <li>No pictures yet.</li>
    {% endfor %}
  </ul>
{% endblock %}
