<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dad Jokes - Joke Detail</title>
  <style>
    body { font-family: sans-serif; max-width: 760px; margin: 2rem auto; line-height: 1.5; }
    nav a { margin-right: 12px; }
  </style>
</head>
<body>
  <h1>Joke #{{ joke.pk }}</h1>
  <nav>
    <a href="{% url 'dadjokes_index' %}">Home</a>
    <a href="{% url 'dadjokes_jokes' %}">All Jokes</a>
  </nav>

  <p>{{ joke.text }}</p>
  <p><strong>Contributor:</strong> {{ joke.contributor }}</p>
  <p><small>{{ joke.created_at }}</small></p>
</body>
</html>
