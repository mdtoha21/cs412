{% load static %}  

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mini Insta</title>
    <link rel="stylesheet" type="text/css" href="{% static 'style.css' %}">
</head>
<body>
    <header>
        <h1>Mini Insta</h1>
        <nav>
            {% if user.is_authenticated %}
                <span>Logged in as: {{ user.username }}</span><br>
                <a href="{% url 'show_my_profile' %}">My Profile</a><br>
                <a href="{% url 'search' %}">Search</a><br>
                <a href="{% url 'show_feed' %}">Feed</a><br>
                <form method="post" action="{% url 'logout' %}" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit">Logout</button>
                </form><br>
            {% else %}
                <a href="{% url 'login' %}">Login</a><br>
                <a href="{% url 'create_profile' %}">Create Profile</a><br>
            {% endif %}
            <a href="{% url 'show_all_profiles' %}">All Profiles</a>
        </nav>
    </header>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer>
    </footer>
</body>
</html>
